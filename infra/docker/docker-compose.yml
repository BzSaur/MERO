services:
  db:
    image: postgres:16-alpine
    container_name: mero-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mero_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mero_db}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mero} -d ${POSTGRES_DB:-mero_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
      target: production
    container_name: mero-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mero}:${POSTGRES_PASSWORD:-mero_secret}@db:5432/${POSTGRES_DB:-mero_db}?schema=public
    ports:
      - '${API_PORT:-3000}:3000'
    networks:
      - default
      - vita_network
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    container_name: mero-web
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      API_URL: http://api:3000/api
    ports:
      - '${WEB_PORT:-4000}:4000'
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: mero-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

networks:
  default:
  vita_network:
    external: true
    name: erp_erp_network

volumes:
  pgdata:
  backups:
