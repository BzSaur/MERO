services:
  db:
    image: postgres:16-alpine
    container_name: mero-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mero_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mero_db}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mero}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: mero-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mero}:${POSTGRES_PASSWORD:-mero_secret}@db:5432/${POSTGRES_DB:-mero_db}?schema=public
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mero-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  pgdata:
  backups:
