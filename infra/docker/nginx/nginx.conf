worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Log dedicado para tráfico de checadores ADMS (formato con SN y latencia)
    log_format adms '$remote_addr [$time_local] "$request" $status '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        set $api_upstream      http://api:3000;
        set $web_upstream      http://web:4000;

        # API
        location /api/ {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # SSE -- necesita desactivar buffering
        location /api/metricas/stream {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
        }

        # Web app (todo lo demas)
        location / {
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }

    server {
        listen 8080;
        server_name _;

        set $vita_upstream http://erp_rh_app:3001;

        location / {
            proxy_pass $vita_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================================
    # CHECADORES ADMS (CLK-980) — endpoint dedicado y aislado
    # listen 8090 (interno) -> host 8082. Solo expone /iclock/* a Vita.
    # Tráfico de devices separado del resto, con su propio access_log.
    # ============================================================
    server {
        listen 8090;
        server_name _;

        access_log /var/log/nginx/adms_access.log adms;
        error_log  /var/log/nginx/adms_error.log;

        # Devices ZK mandan text/plain u octet-stream; cuerpos chicos.
        client_max_body_size 5m;

        # Allowlist de IPs públicas de las plantas (ACTIVAR cuando sean fijas).
        # Mientras se prueban/mueven checadores, queda abierto + rate-limit en Vita.
        # Ejemplo a futuro:
        #   allow 200.10.20.30;   # Planta RAM 1
        #   allow 200.10.20.31;   # Planta RAM 2
        #   deny all;

        set $vita_upstream http://erp_rh_app:3001;

        # Solo el protocolo ADMS pasa; cualquier otra ruta se rechaza.
        location /iclock/ {
            proxy_pass $vita_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Devices lentos / reintentos: timeouts holgados, sin buffering raro
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        location = / {
            return 200 "ADMS endpoint OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
}
