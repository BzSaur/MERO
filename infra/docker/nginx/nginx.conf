worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    upstream api {
        server api:3000;
    }

    upstream web {
        server web:4000;
    }

    upstream vita {
        server erp_rh_app:3001;
    }

    server {
        listen 80;
        server_name _;

        if ($request_method = OPTIONS) {
            return 405;
        }

        location /api/ {
            limit_except GET POST HEAD {
                deny all;
            }
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /api/metricas/stream {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
        }

        location /.well-known/security.txt {
            root /etc/nginx/static;
        }

        location / {
            limit_except GET POST HEAD {
                deny all;
            }
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://vita;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}