worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Seguridad básica
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;  # SSE necesita timeout largo

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    upstream api {
        server api:3000;
    }

    server {
        listen 80;
        server_name _;

        # Redirigir a HTTPS en producción (descomentar cuando haya certs)
        # return 301 https://$host$request_uri;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE — necesita desactivar buffering
        location /api/metricas/stream {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
        }
    }

    # HTTPS (descomentar cuando haya certificados)
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
