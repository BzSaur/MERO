worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Headers de seguridad globales
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

